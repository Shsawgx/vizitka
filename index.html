<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкуро Артемий | Web-разработчик</title>
    
    <link rel="icon" href="img/icon.png" type="image/png">
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --modal-bg: rgba(15, 23, 42, 0.98);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; z-index: -1; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 450px; width: 90%;
            transition: transform 0.3s ease;
        }

        .avatar-img {
            width: 200px; height: 200px; border-radius: 50%;
            object-fit: cover; margin: 0 auto 20px; display: block;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .small-icon { width: 35px; height: 35px; filter: drop-shadow(0 0 5px var(--primary-color)); }

        .contact-btn {
            cursor: pointer; border: none; background: var(--primary-color);
            color: #000; padding: 15px 40px; border-radius: 50px;
            font-weight: bold; transition: 0.3s;
        }

        .contact-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--primary-color); }

        /* Модальное окно */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal {
            background: var(--modal-bg); padding: 30px; border-radius: 24px;
            border: 1px solid var(--primary-color); width: 320px; text-align: center;
            animation: modalSlide 0.4s ease;
        }

        @keyframes modalSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .social-link {
            display: block; text-decoration: none; color: #fff;
            background: rgba(255, 255, 255, 0.05); padding: 12px;
            margin: 10px 0; border-radius: 12px; transition: 0.3s;
        }

        .social-link:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--primary-color); }

        /* Блок копирования почты */
        .email-copy-box {
            margin-top: 20px; padding: 10px;
            background: rgba(0, 0, 0, 0.3); border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px dashed rgba(0, 210, 255, 0.5);
        }

        .email-text { font-size: 0.85rem; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; }

        .copy-trigger {
            background: var(--primary-color); color: #000;
            border: none; padding: 6px 12px; border-radius: 8px;
            font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        .copy-trigger:active { transform: scale(0.9); }

        .close-modal { margin-top: 20px; font-size: 0.8rem; color: var(--text-dim); cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="card">
        <img src="img/my-photo.jpg" alt="Шкуро Артемий" class="avatar-img">
        <div class="name-wrapper">
            <h1>Шкуро Артемий</h1>
        </div>
        <span style="color:var(--primary-color); font-weight:bold; display:block; margin: 10px 0;">Web Developer</span>
        <p>Разработка сайтов любой сложности: от идеи до запуска.</p>
        <button class="contact-btn" id="openModal">Связаться со мной</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 style="margin-top:0">Связь со мной</h3>
            
            <a href="https://t.me/redBlazeTide" target="_blank" class="social-link">Telegram</a>
            <a href="https://vk.com/who_this_mann" target="_blank" class="social-link">ВКонтакте</a>

            <div style="margin-top: 20px; font-size: 0.8rem; color: var(--text-dim);">Или скопируйте почту:</div>
            
            <div class="email-copy-box">
                <span class="email-text" id="emailValue">artemijshkuro@mail.ru</span>
                <button class="copy-trigger" id="copyBtn">Копировать</button>
            </div>

            <div class="close-modal" id="closeModal">Закрыть</div>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const overlay = document.getElementById('modalOverlay');
        const copyBtn = document.getElementById('copyBtn');
        const emailValue = document.getElementById('emailValue').innerText;

        // Открытие/Закрытие модалки
        openBtn.onclick = () => overlay.style.display = 'flex';
        closeBtn.onclick = () => overlay.style.display = 'none';
        overlay.onclick = (e) => { if (e.target === overlay) overlay.style.display = 'none'; };

        // Логика копирования
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(emailValue).then(() => {
                copyBtn.innerText = 'Готово!';
                copyBtn.style.background = '#4cd137'; // Зеленый цвет при успехе
                setTimeout(() => {
                    copyBtn.innerText = 'Копировать';
                    copyBtn.style.background = '#00d2ff';
                }, 2000);
            });
        };

        // Анимированный фон (упрощенный для стабильности)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const init = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({length: 80}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: Math.random() - 0.5,
                vy: Math.random() - 0.5
            }));
        };
        const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 210, 255, 0.2)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        };
        window.onresize = init;
        init(); animate();
    </script>
</body>
</html>
